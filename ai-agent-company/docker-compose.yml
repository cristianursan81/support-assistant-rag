version: "3.9"

# GestorIA — single-VPS deployment (Hetzner CX11 / Contabo S / any 2vCPU 4GB VPS)
# Runs comfortably on 1 vCPU, 512 MB RAM for up to 50 active tenants.
#
# Usage:
#   cp .env.example .env && nano .env   # fill in API keys
#   docker compose up -d
#   docker compose logs -f gestor       # follow logs
#
# Ports exposed:
#   7861 → Gradio operator dashboard
#   8000 → FastAPI (webhooks + REST API)
#
# For HTTPS / custom domain: put Caddy or Nginx in front.
# For Twilio webhooks: set BASE_URL=https://yourdomain.com in .env

services:
  gestor:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "7861:7861"
    env_file:
      - .env
    # Override CMD to run both API + dashboard (dev/single-container mode).
    # Remove this override to use the production Gunicorn CMD from the Dockerfile.
    command: ["python", "run.py"]
    volumes:
      - gestor_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.5"

volumes:
  gestor_data:
